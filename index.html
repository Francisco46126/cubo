<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>The Cube</title>
   <link rel="stylesheet" href="style.css">

  </head>
    
  <body>
  <!-- PWA: https://bsehovac.github.io/the-cube/ -->

<div class="ui">

  <div class="ui__background"></div>

  <div class="ui__game"></div>

  <div class="ui__texts">
    <h1 class="text text--title">
      <span>THE</span>
      <span>CUBE</span>
    </h1>
    <div class="text text--note">
      Presiona 2 veces para iniciar
    </div>
    <div class="text text--timer">
      0:00
    </div>
    <div class="text text--complete">
      <span>Completado!</span>
    </div>
    <div class="text text--best-time">
      <icon trophy></icon>
      <span>Mejor tiempo!</span>
    </div>
  </div>

  <div class="ui__prefs">
    <range name="size" title="Tamaño del cubo" list="2,3,4,5"></range>
    <range name="flip" title="Tipo movimiento" list="Swift&nbsp;,Smooth,Bounce"></range>
    <range name="scramble" title="Longitud de la mezcla" list="20,25,30"></range>
    <range name="fov" title="Angulo de camara" list="Ortographic,Perspective"></range>
    <range name="theme" title="Combinacion de colores" list="Cube,Erno,Dust,Camo,Rain"></range>
  </div>

  <div class="ui__theme">
    <range name="hue" title="Matiz" color></range>
    <range name="saturation" title="Saturacion" color></range>
    <range name="lightness" title="Suave" color></range>
  </div>

  <div class="ui__stats">
    <div class="stats" name="Tamaño cubo">
      <i>Cubo:</i><b>3x3x3</b>
    </div>
    <div class="stats" name="Soluciones totales ">
      <i>Soluciones totales:</i><b>-</b>
    </div>
    <div class="stats" name="Mejor tiempo">
      <i>Mejor tiempo:</i><b>-</b>
    </div>
    <div class="stats" name="Peor tiempo">
      <i>Peor tiempo:</i><b>-</b>
    </div>
    <div class="stats" name="Promedio-5">
      <i>Promedio de 5:</i><b>-</b>
    </div>
    <div class="stats" name="Promedio-12">
      <i>Promedio de 12:</i><b>-</b>
    </div>
    <div class="stats" name="Promedio-25">
      <i>Promedio de 25:</i><b>-</b>
    </div>
  </div>

  <div class="ui__buttons">
    <button class="btn btn--bl btn--stats">
      <icon trophy></icon>
    </button>
    <button class="btn btn--br btn--prefs">
      <icon settings></icon>
    </button>
    <button class="btn btn--bl btn--back">
      <icon back></icon>
    </button>
    <button class="btn btn--br btn--theme">
      <icon theme></icon>
    </button>
    <button class="btn btn--br btn--reset">
      <icon reset></icon>
    </button>
  </div>

</div>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/three.js/95/three.min.js'></script><script  src="script.js"></script>

  </body>
  
</html>
